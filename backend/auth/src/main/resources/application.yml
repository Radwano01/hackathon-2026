server:
  port: 8888

spring:
  application:
    name: auth

  datasource:
    url: jdbc:postgresql://localhost:5432/auth
    username: radwan
    password: password

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


jwt:
  secret: "CHANGE_THIS_TO_A_64_BYTE_RANDOM_SECRET_KEY"
  expiration: 900000   # 15 minutes (in milliseconds)