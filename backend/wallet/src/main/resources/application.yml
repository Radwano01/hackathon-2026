server:
  port: 8010

spring:
  application:
    name: wallet

  datasource:
    url: jdbc:postgresql://localhost:5432/wallets
    username: radwan
    password: password

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka